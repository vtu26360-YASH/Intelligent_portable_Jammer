<!DOCTYPE html>
<html>

<head>
    <title>Vel Tech AI-ECM Control Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socketio.io/4.0.0/socketio.min.js"></script>
    <style>
        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
        }

        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 10px;
        }

        .log-box {
            background: #000;
            color: #00ff00;
            height: 300px;
            overflow-y: scroll;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #444;
        }

        .status-active {
            color: #ff4757;
            font-weight: bold;
        }

        .status-scan {
            color: #2ed573;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <h2 class="mb-4">Vel Tech AI-ECM <span class="text-muted">| Command Center</span></h2>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>System Status</h5>
                    <p id="status" class="status-scan">SCANNING</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Targets Neutralized</h5>
                    <h2 id="count">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Power Rail Stability</h5>
                    <p id="pwr-status" style="color: #2ed573;">99.2% (STABLE)</p>
                </div>
            </div>
        </div>

        <div class="stat-card">
            <h5>AI Intelligence Feed</h5>
            <div id="log" class="log-box"></div>
        </div>
    </div>

    <script>
        var socket = io();
        socket.on('update', function (data) {
            document.getElementById('count').innerText = data.count;
            var statusEl = document.getElementById('status');
            statusEl.innerText = data.status.toUpperCase();
            statusEl.className = data.status === 'Jamming' ? 'status-active' : 'status-scan';

            var log = document.getElementById('log');
            log.innerHTML += "<div>[" + new Date().toLocaleTimeString() + "] " + data.msg + "</div>";
            log.scrollTop = log.scrollHeight;
        });
    </script>
</body>

</html>
